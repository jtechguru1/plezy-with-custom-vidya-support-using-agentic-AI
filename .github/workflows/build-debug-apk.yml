name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true
          pub-cache: false

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-v2-${{ hashFiles('pubspec.yaml', 'pubspec.lock') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile --no-example

      - name: Build debug APK (armeabi-v7a)
        run: flutter build apk --debug --target-platform android-arm

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk
          retention-days: 7
