name: Build Debug APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true
          pub-cache: false

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Setup debug keystore
        env:
          ANDROID_DEBUG_KEYSTORE: ${{ secrets.ANDROID_DEBUG_KEYSTORE }}
        run: |
          mkdir -p ~/.android
          if [ -n "$ANDROID_DEBUG_KEYSTORE" ]; then
            printf '%s' "$ANDROID_DEBUG_KEYSTORE" | base64 -di > ~/.android/debug.keystore
            echo "Using keystore from secret ANDROID_DEBUG_KEYSTORE" >> $GITHUB_STEP_SUMMARY
          else
            keytool -genkey -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            {
              echo "No ANDROID_DEBUG_KEYSTORE secret found -- generated a new one."
              echo "Set the following as a GitHub secret named ANDROID_DEBUG_KEYSTORE to lock the signature across builds:"
              echo KEYSTORE_BASE64_BEGIN
              base64 -w 0 ~/.android/debug.keystore
              echo KEYSTORE_BASE64_END
            } >> $GITHUB_STEP_SUMMARY
          fi

      - name: Install dependencies
        run: flutter pub get --no-example

      - name: Build debug APK (armeabi-v7a)
        run: flutter build apk --debug --target-platform android-arm

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Publish to debug-latest release
        run: |
          gh release delete debug-latest --yes 2>/dev/null || true
          gh release create debug-latest \
            --title "Debug APK (latest)" \
            --notes "Auto-built debug APK for armeabi-v7a (Google TV). Not a production build." \
            --prerelease \
            build/app/outputs/flutter-apk/app-debug.apk#plezy-vidya-debug.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}